name: ecommerce
description: Ecommerce Flutter portfolio app with Firebase, catalog, cart, checkout, and admin dashboard.
publish_to: 'none'
version: 2.0.0+2

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cloud_firestore: 5.6.9
  firebase_auth: 5.6.0
  firebase_core: 3.14.0
  google_fonts: 6.3.3
  provider: 6.1.5
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: 4.0.0

flutter:
  uses-material-design: true
