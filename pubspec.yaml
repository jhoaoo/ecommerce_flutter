name: ecommerce
description: Multifunctional Flutter ecommerce portfolio app with Firebase Auth, Firestore, Storage, FCM, Google Sign-In, role dashboards, and demo cloud simulation.
publish_to: 'none'
version: 3.1.0+4

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cloud_firestore: 5.6.9
  firebase_auth: 5.6.0
  firebase_core: 3.14.0
  firebase_messaging: 15.2.7
  firebase_storage: 12.4.7
  google_fonts: 6.3.3
  google_sign_in: 6.3.0
  provider: 6.1.5
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: 4.0.0

flutter:
  uses-material-design: true
